<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Online Library – Login</title>
   <!-- icon -->
    <link rel="icon" href="assets/main-photos/icon.svg" >
</head>
<body>

  <nav>
    <span class="nav-brand" style="display: flex; align-items: center; gap: 10px;">kotoby <img src="assets/main-photos/icon.svg" alt="icon" style="width: 30px; height: 30px;"></span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="login.html" class="active">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">

      <h2 id="form-title">Login</h2>

      <form action="#" method="post">

        <label for="login-username">Username:</label><br>
        <input type="text" id="login-username" name="username" placeholder="Enter your username"><br><br>

        <label for="login-password">Password:</label><br>
        <input type="password" id="login-password" name="password" placeholder="Enter your password"><br><br>

        <div class="radio">
          <input type="radio" id="role-user" name="is_admin" value="0" checked>
          <label for="role-user">User</label>

          <input type="radio" id="role-admin" name="is_admin" value="1">
          <label for="role-admin">Admin</label>
        </div>

        <div class="submit">
          <input type="submit" id="mySubmit" value="Login">
        </div>

      </form>

      <p id="quest">Don't have an account? <a href="signup.html">Sign Up</a></p>

    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
