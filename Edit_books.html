<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
</head>

<!--helped-->
<div style="width:450px; margin:0 auto; border:1px solid #ccc; padding:30px;
    text-align:left; border-radius:10px;
    background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

    <body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding-top: 50px;">

        <h1 style="text-align:center; margin-bottom:20px; color: #333;">Edit Book Form</h1>
        <hr>
        <hr>
        <br

   <!--helped--> <div style="width:450px; margin:0 auto; border:1px solid #ccc; padding:30px;
    text-align:left; border-radius:10px;
    background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

            <form>
                <label for="bookid" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Book ID:</label>
                <input list="book_ids" id="bookid" name="book_id" value="1" style="width:100%;
            padding:10px; margin-bottom:20px; font-size:16px; border: 1px solid #ccc;
            border-radius: 40px; box-sizing: border-box;">


                <datalist id="book_ids">
                    <option value="1">
                    <option value="2">
                    <option value="3">
                    <option value="4">
                    <option value="5">
                    <option value="6">
                </datalist>

                <label for="title" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Book Title:</label>

                <input list="titles" id="title" name="title" value="Noah Alfi" style="width:100%; padding:10px; margin-bottom:20px;
            font-size:16px; border: 1px solid #ccc; border-radius: 40px; box-sizing: border-box;">


                <datalist id="titles">
                    <option value="Noah Alfi">
                    <option value="Gärtin Rules">
                    <option value="Healing the Child Within">
                    <option value="The Ordinary Myth">
                    <option value="Clean Code">
                    <option value="Data Structures and Algorithm Analysis in C++">
                    <option value="Algorithms">
                </datalist>

                <label for="author" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Author:</label>

                <input list="authors" id="author" name="author" value="Mirna El-Mahdy" style="width:100%; padding:10px; margin-bottom:20px;
            font-size:16px;border : 1px solid #ccc; border-radius: 40px; box-sizing: border-box;">

                <datalist id="authors">
                    <option value="Mirna El-Mahdy">
                    <option value="Amr Abdel Hamid">
                    <option value="Charles L. Whitfield">
                    <option value="Gabor Mate">
                    <option value="Robert C. Martin">
                    <option value="Mark Allen Weiss">
                    <option value="Thomas H. Cormen">
                </datalist>

                <label for="category" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Category:</label>

                <input list="categories" id="category" name="category" value="Fiction" style="width:100%; padding:10px; margin-bottom:20px;
            font-size:16px; border: 1px solid #ccc; border-radius: 40px; box-sizing: border-box;">

                <datalist id="categories">
                    <option value="Fiction">
                    <option value="Self-Help">
                    <option value="Fantasy">
                    <option value="Mystery">
                    <option value="Software Engineering">
                    <option value="Computer Science">
                </datalist>

                <label for="year" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Year:</label>

                <input list="years" id="year" name="year" value="2022" style="width:100%; padding:10px; margin-bottom:20px;
            font-size:16px; border: 1px solid #ccc; border-radius: 40px; box-sizing: border-box;">

                <datalist id="years">
                    <option value="2020">
                    <option value="2021">
                    <option value="2022">
                    <option value="2023">
                    <option value="2024">
                    <option value="2025">
                    <option value="2026">
                </datalist>

                <label for="copies" style="display:block; margin-bottom:8px; font-weight:bold; color: #555;">Available Copies:</label>

                <input list="copies_list" id="copies" name="copies" value="2" style="width:100%; padding:10px; margin-bottom:25px;
             font-size:16px; border: 1px solid #ccc; border-radius: 40px; box-sizing: border-box;">

                <datalist id="copies_list">
                    <option value="1">
                    <option value="2">
                    <option value="3">
                    <option value="5">
                </datalist>

                <div style="text-align: left;">
                    <input type="submit" value="Update_Book" style="padding:10px 20px; margin-right:10px;
                font-size:16px; cursor:pointer; background-color: #efefef; border: 1px solid #767676; border-radius: 20px;">

                    <input type="reset" value="Cancel" style="padding:10px 20px; font-size:16px; cursor:pointer;
                background-color: #efefef; border: 1px solid #767676; border-radius: 20px;">
                </div>

            </form>

        </div>

    </body>
</html>
