<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details | Lumina</title>
    <style>
        :root {
            --dark-blue: #194569;
            --medium-blue: #5F84A2;
            --soft-blue: #91AEC4;
            --white: #ffffff;
            --pale-blue: rgba(219, 236, 244, 0.94);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--dark-blue);
            background-image: url('borrowedbook-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-blend-mode: overlay;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes slideFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-60px) rotateY(-10deg);
            }

            100% {
                opacity: 1;
                transform: translateX(0) rotateY(-22deg);
            }
        }

        @keyframes slideFromRight {
            0% {
                opacity: 0;
                transform: translateX(60px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideFromBottom {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        nav {
            background: var(--dark-blue);
            padding: 1rem;
            text-align: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        .book-details-main {
            display: flex;
            background: var(--pale-blue);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 45px black;
            transition: opacity 0.3s ease;
        }

        .book-cover-part {
            flex: 1;
            background: rgba(25, 69, 105, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 35px;
            perspective: 1000px;
            animation: slideFromLeft 0.5s ease-out;
        }

            .book-cover-part img {
                width: 260px;
                height: 380px;
                object-fit: cover;
                border-radius: 5px 15px 15px 5px;
                transform: rotateY(-20deg) rotateX(4deg);
                transition: transform 0.3s linear;
                cursor: pointer;
            }

            .book-cover-part:hover img {
                transform: rotateY(0deg) rotateX(0deg) scale(1.05);
            }

        .book-info-part {
            flex: 1.5;
            padding: 35px;
            display: flex;
            flex-direction: column;
            animation: slideFromRight 0.7s ease-out;
        }

        .description-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--medium-blue);
            margin: 15px 0;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .details-book {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .borrow-button {
            background: var(--dark-blue);
            color: white;
            flex: 2;
        }

            .borrow-button:hover {
                background: #123450;
                transform: translateY(-3px);
                box-shadow: 0 5px 15px black;
            }

        .back-button {
            background: rgba(0,0,0,0.08);
            color: var(--dark-blue);
            flex: 1;
        }

            .back-button:hover {
                background: var(--soft-blue);
                color: white;
                transform: translateY(-3px);
            }

        .suggestions {
            margin-top: 40px;
            animation: slideFromBottom 0.8s ease-out;
        }

            .suggestions h3 {
                color: white;
                text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            }

        .suggestion-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .suggestion-book {
            min-width: 150px;
            background: var(--pale-blue);
            padding: 12px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

            .suggestion-book img {
                width: 130px;
                height: 185px;
                object-fit: cover;
                border-radius: 8px;
                margin-bottom: 8px;
            }

            .suggestion-book:hover {
                transform: translateY(-10px);
                background: var(--soft-blue);
            }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="user_book_list.html">Books List</a>
            <a href="Borrowed_books.html">My Library</a>
            <a href="search.html">Search</a>
        </div>
    </nav>

    <div class="container">
        <div class="book-details-main" id="details-container">
            <div class="book-cover-part">
                <img src="" id="main-book-img" alt="book cover">
            </div>
            <div class="book-info-part">
                <h1 id="book-title" style="margin:0;"></h1>
                <p style="color: var(--medium-blue); margin: 5px 0 15px 0;">by <span id="author-name"></span></p>

                <div class="description-box" id="book-description"></div>
                <div class="details-book">
                    <div class="detail-item"><b>Book ID:</b> <span id="book-id"></span></div>
                    <div class="detail-item"><b>Category:</b> <span id="book-cat"></span></div>
                    <div class="detail-item"><b>Year of Publish:</b> <span id="book-year"></span></div>
                    <div class="detail-item"><b>Available Copies:</b> <span id="book-copies"></span></div>
                </div>
                <div class="action-buttons">
                    <button class="borrow-button" onclick="borrowBook()">Borrow Now</button>
                    <button class="back-button" onclick="goToBookList()">Back</button>
                </div>
            </div>
        </div>

        <div class="suggestions">
            <h3>Books you might like</h3>
            <div class="suggestion-grid">
                <div class="suggestion-book" onclick="updateDetails('بيوت منورة', 'هالة سمير', 'R001', 'Religious', '2023', '8', 'نصائح لبناء أسرة مسلمة سعيدة.', 'assets/religious/buit_menwarah.jpg')">
                    <img src="assets/religious/buit_menwarah.jpg"><p>بيوت منورة</p>
                </div>
                <div class="suggestion-book" onclick="updateDetails('إلى الله', 'أمير منير', 'R002', 'Religious', '2022', '9', 'رحلة إيمانية مبسطة للتقرب من الله.', 'assets/religious/ela_Allah.jpg')">
                    <img src="assets/religious/ela_Allah.jpg"><p>إلى الله</p>
                </div>
                <div class="suggestion-book" onclick="updateDetails('Atomic Habits', 'James Clear', 'S001', 'Self Help', '2018', '10', 'Tiny changes, remarkable results.', 'assets/self_help/atomic_habits.png')">
                    <img src="assets/self_help/atomic_habits.png"><p>Atomic Habits</p>
                </div>
                <div class="suggestion-book" onclick="updateDetails('فاتتني صلاة', 'إسلام جمال', 'R003', 'Religious', '2020', '10', 'كتاب يساعدك على الالتزام بالصلاة.', 'assets/religious/fatetni_salah.jpg')">
                    <img src="assets/religious/fatetni_salah.jpg"><p>فاتتني صلاة</p>
                </div>
                <div class="suggestion-book" onclick="updateDetails('The Idiot Brain', 'Dean Burnett', 'S004', 'Self Help', '2016', '7', 'What your head is really up to.', 'assets/self_help/The_Idiot_Brain.jpg')">
                    <img src="assets/self_help/The_Idiot_Brain.jpg"><p>The Idiot Brain</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // أول ما الصفحة تفتح.. نجيب البيانات اللي اتبعتت من صفحة قائمة الكتب
        window.onload = function() {
        const book = JSON.parse(localStorage.getItem('selectedBook'));
        if (book) {
        fillData(book.title, book.author, book.id, book.cat, book.year, book.copies, book.description, book.image);
        }
        };

        // دالة مساعدة لملء البيانات في الصفحة
        function fillData(title, author, id, cat, year, copies, description, imgSource) {
        document.getElementById('book-title').innerText = title;
        document.getElementById('author-name').innerText = author;
        document.getElementById('book-id').innerText = id;
        document.getElementById('book-cat').innerText = cat;
        document.getElementById('book-year').innerText = year;
        document.getElementById('book-copies').innerText = copies;
        document.getElementById('book-description').innerText = description;
        document.getElementById('main-book-img').src = imgSource;
        }

        function updateDetails(title, author, id, cat, year, copies, description, imgSource) {
        const container = document.getElementById('details-container');
        container.style.opacity = "0.5";

        setTimeout(() => {
        fillData(title, author, id, cat, year, copies, description, imgSource);
        container.style.opacity = "1";
        // نحدث الذاكرة بالكتاب الجديد عشان لو عمل Refresh يفضل عليه
        localStorage.setItem('selectedBook', JSON.stringify({title, author, id, cat, year, copies, description, image: imgSource}));
        }, 150);
        }

        function borrowBook() {
        const bookData = {
        title: document.getElementById('book-title').innerText,
        author: document.getElementById('author-name').innerText,
        category: document.getElementById('book-cat').innerText,
        image: document.getElementById('main-book-img').getAttribute('src')
        };

        let borrowedBooks = JSON.parse(localStorage.getItem('myLibrary')) || [];
        if (!borrowedBooks.find(b => b.title === bookData.title)) {
        borrowedBooks.push(bookData);
        localStorage.setItem('myLibrary', JSON.stringify(borrowedBooks));
        alert("Book added successfully!");
        } else {
        alert("Already in your library!");
        }
        window.location.href = "Borrowed_books.html";
        }

        function goToBookList() { window.location.href = "user_book_list.html"; }
    </script>
</body>
</html>
