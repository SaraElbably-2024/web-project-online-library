<!DOCTYPE html>
<html>
<head>
    <title>Kotoby-search</title>
    <link rel="stylesheet" href="style.css">
     <!-- icon -->
    <link rel="icon" href="assets/main-photos/icon.svg" >
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand" style="display: flex; align-items: center; gap: 10px;">kotoby <img src="assets/main-photos/icon.svg" alt="icon" style="width: 30px; height: 30px;"></div>
    
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="user_book_list.html">Book List</a>
            <a href="index.html">Logout</a> 
        </div>
    </nav>
    <hr>
    
    <div class="container">
        <h2 id="form-title">Search for a Book</h2>

        <!-- Search Form -->
        <form id="searchForm">
            <label>Book Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter book title">

            <br><br>

            <label>Author Name:</label>
            <input type="text" id="author" name="author" placeholder="Enter author name">

            <br><br>

            <label>Category:</label>
            <select id="category" name="category">
                <option value="">Select Category</option>
                <option>Self Help</option>
                <option>Fiction</option>
                <option>Religious</option>
                <option>Programming</option>
                <option>Computer Science</option>
            </select>

            <br><br>

            <label>Publication Year:</label>
            <input type="number" id="year" name="year" placeholder="Enter Publication Year">

            <br><br>

            <button type="submit">Search</button>
        </form>
    </div>

    <hr>

    <script src="search.js"></script>
</body>
</html>
