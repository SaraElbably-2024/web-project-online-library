<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoby-Admin Profile</title>
    <link rel="stylesheet" href="style.css">
     <!-- icon -->
    <link rel="icon" href="assets/main-photos/icon.svg" >
</head>

<body>

    <nav>
        <span class="nav-brand" style="display: flex; align-items: center; gap: 10px;">
            kotoby <img src="assets/main-photos/icon.svg" alt="icon" style="width: 30px; height: 30px;">
        </span>
        <div class="nav-links">
            <a href="admin_book_list.html">Books</a>
            <a href="add book.html">Add Book</a>
            <a href="edit book.html">Edit Book</a>
            <a href="admin_profile.html" class="active">Profile</a>
            <a href="index.html">Log out</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <h2 id="form-title">Profile Information</h2>

            <form id="profileForm">
                <label for="name">Full Name:</label>
                <input type="text" id="name" placeholder="Your name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" placeholder="email@example.com" required>

                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="New password" required>

                <label>Account Role:</label>
                <input type="text" value="Administrator" readonly style="opacity: 0.7; cursor: not-allowed;">

                <div class="submit">
                    <input type="submit" value="Update Profile"
                        style="width: 100%; margin-top: 20px; height: 45px; cursor: pointer; background: white; color: #601bde; border-radius: 8px; border: none; font-weight: bold; transition: 0.3s;">
                </div>
            </form>
        </div>
    </div>

    <script src="admin_profile.js"></script>

</body>

</html>
