<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Library - Login</title>
</head>
<body>
      <!-- Navigation Bar -->
    <nav> 
        <a href="index.html">Home</a> |

    <hr>

  <h1>  Online Library</h1>
  <p>Your gateway to knowledge</p>

  <hr>

  
  <h2>Create Account</h2>

  <form action="#" method="post">

    <label for="su-username">Username:</label><br>
    <input type="text" id="su-username" name="username" placeholder="Choose a username" required minlength="3"><br><br>

    <label for="su-email">Email:</label><br>
    <input type="email" id="su-email" name="email" placeholder="your@email.com" required><br><br>

    <label for="su-password">Password:</label><br>
    <input type="password" id="su-password" name="password" placeholder="Min 6 characters" required minlength="6"><br><br>

    <label for="su-confirm">Confirm Password:</label><br>
    <input type="password" id="su-confirm" name="confirm_password" placeholder="Repeat your password" required><br><br>

    <fieldset>
      <legend>Account Type (is_admin):</legend>
      <input type="radio" id="role-user" name="is_admin" value="0" checked>
      <label for="role-user">User</label>
      &nbsp;&nbsp;
      <input type="radio" id="role-admin" name="is_admin" value="1">
      <label for="role-admin">Admin</label>
    </fieldset>

    <br>
    <button type="submit" ><a href="admin_book_list.html"> Sign up as admin</a></button>
    <button type="submit" ><a href="user_book_list.html"> Sign up as user</a></button>
    
  </form>

  <p>Already have an account? <a href="signin.html">Login</a></p>

</body>
</html>
