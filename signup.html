<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Online Library – Sign Up</title>
</head>
<body>

  <nav>
    <span class="nav-brand">Kotoby</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="active">Sign Up</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">

      <h2 id="form-title">Create Account</h2>

      <form action="#" method="post">

        <label for="su-username">Username</label><br>
        <input type="text" id="su-username" name="username" placeholder="Choose a username" minlength="3"><br><br>

        <label for="su-email">Email</label><br>
        <input type="email" id="su-email" name="email" placeholder="your@email.com"><br><br>

        <label for="su-password">Password</label><br>
        <input type="password" id="su-password" name="password" placeholder="Min 6 characters" minlength="6"><br><br>

        <label for="su-confirm">Confirm Password</label><br>
        <input type="password" id="su-confirm" name="confirm_password" placeholder="Repeat your password"><br><br>

        <div class="radio">
          <input type="radio" id="role-user" name="is_admin" value="0" checked>
          <label for="role-user">User</label>

          <input type="radio" id="role-admin" name="is_admin" value="1">
          <label for="role-admin">Admin</label>
        </div>

        <div class="submit">
          <input type="submit" id="mySubmit" value="Sign Up">
        </div>

      </form>

      <p id="quest">Already have an account? <a href="login.html">Login</a></p>

    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
