<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="style add & edit book.css">
</head>
<body>

    <nav>
        <a href="admin_book_list.html">Books</a> |
        <a href="admin_profile.html">Profile</a> |
        <a href="index.html">Log out</a>
    </nav>

    <div class="container">
        <h2 id="form-title">Find Book to Edit</h2>
        
        <form id="search_form">
            <label>Enter Book ID or Name</label>
            <input type="text" name="search_query" id="search_query">
            <span class="error-msg" id="search_query_err"></span>
            
            <input type="submit" value="Search">
        </form>

        <br/>
        

        <h2 id="form-title">Edit Book</h2>
        
        <form id="edit_form">
            <label>Book ID</label>
            <input type="text" name="edit_book_id" id="edit_book_id" readonly>

            <label>Book Name</label>
            <input type="text" name="edit_book_name" id="edit_book_name" maxlength="100">
            <span class="error-msg" id="edit_book_name_err"></span>

            <label>Author Name</label>
            <input type="text" name="edit_author_name" id="edit_author_name" maxlength="50">
            <span class="error-msg" id="edit_author_name_err"></span>

            <label>Category</label>
            <select name="edit_category" id="edit_category">
                <option value="Technology">Technology</option>
                <option value="Science">Science</option>
                <option value="Comedy">Comedy</option>
                <option value="Fiction">Fiction</option>
                <option value="Romance">Romance</option>
                <option value="History">History</option>
                <option value="Others">Others</option>
            </select>

            <label>Description</label>
            <textarea rows="5" name="descri" id="edit_descri"></textarea>

            <input type="submit" value="Update Book">
            <span class="success-msg" id="success_msg"></span>
        </form>
    </div>

    <script src="edit_book.js"></script>
</body>
</html>
